kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
- role: control-plane
  kubeadmConfigPatches:
  - |
    kind: InitConfiguration
    nodeRegistration:
      kubeletExtraArgs:
        node-labels: "ingress-ready=true"
  # Add this section to map the NodePort to your Windows Host
  extraPortMappings:
  - containerPort: 30080
    hostPort: 30080
    protocol: TCP
